<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Board columns (3 kanban columns) -->
  <!-- Column 1 -->
  <rect x="16" y="28" width="26" height="78" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Column 2 -->
  <rect x="50" y="28" width="26" height="78" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Column 3 -->
  <rect x="84" y="28" width="26" height="78" rx="4" fill="rgba(255,255,255,0.15)"/>
  <!-- Column headers -->
  <rect x="20" y="32" width="18" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="54" y="32" width="18" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
  <rect x="88" y="32" width="18" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Cards in column 1 -->
  <rect x="20" y="42" width="18" height="14" rx="3" fill="white" opacity="0.9"/>
  <rect x="20" y="60" width="18" height="14" rx="3" fill="white" opacity="0.9"/>
  <rect x="20" y="78" width="18" height="14" rx="3" fill="white" opacity="0.9"/>
  <!-- Cards in column 2 -->
  <rect x="54" y="42" width="18" height="14" rx="3" fill="white" opacity="0.9"/>
  <rect x="54" y="60" width="18" height="14" rx="3" fill="#FCD34D" opacity="0.9"/>
  <!-- Cards in column 3 -->
  <rect x="88" y="42" width="18" height="14" rx="3" fill="#34D399" opacity="0.9"/>
  <rect x="88" y="60" width="18" height="14" rx="3" fill="#34D399" opacity="0.9"/>
  <!-- Card lines (task text indication) -->
  <rect x="23" y="46" width="12" height="2" rx="1" fill="#6366F1" opacity="0.4"/>
  <rect x="23" y="50" width="8" height="2" rx="1" fill="#6366F1" opacity="0.3"/>
  <rect x="23" y="64" width="12" height="2" rx="1" fill="#6366F1" opacity="0.4"/>
  <rect x="23" y="68" width="8" height="2" rx="1" fill="#6366F1" opacity="0.3"/>
  <rect x="23" y="82" width="12" height="2" rx="1" fill="#6366F1" opacity="0.4"/>
  <rect x="23" y="86" width="8" height="2" rx="1" fill="#6366F1" opacity="0.3"/>
  <rect x="57" y="46" width="12" height="2" rx="1" fill="#6366F1" opacity="0.4"/>
  <rect x="57" y="50" width="8" height="2" rx="1" fill="#6366F1" opacity="0.3"/>
  <!-- Agent icon (small robot/bot indicator) -->
  <circle cx="103" cy="98" r="8" fill="white" opacity="0.9"/>
  <circle cx="100" cy="96" r="1.5" fill="#6366F1"/>
  <circle cx="106" cy="96" r="1.5" fill="#6366F1"/>
  <rect x="99" y="100" width="8" height="2" rx="1" fill="#6366F1" opacity="0.5"/>
</svg>